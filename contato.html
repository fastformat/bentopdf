<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Contato – FastFormat | FastFormat</title>
    <meta name="description" content="Fale com a equipe do FastFormat." />
    <meta name="author" content="FastFormat" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://fastformat.co/pdf/contato" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fastformat.co/pdf/contato" />
    <meta property="og:title" content="Contato – FastFormat | FastFormat" />
    <meta
      property="og:description"
      content="Fale com a equipe do FastFormat."
    />
    <meta
      property="og:image"
      content="https://fastformat.co/pdf/images/og-tools.png"
    />
    <meta property="og:site_name" content="FastFormat" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contato – FastFormat" />
    <meta
      name="twitter:description"
      content="Fale com a equipe do FastFormat."
    />
    <meta
      name="twitter:image"
      content="https://fastformat.co/pdf/images/og-tools.png"
    />
    <meta name="twitter:site" content="@FastFormat" />

    <link href="/src/css/styles.css" rel="stylesheet" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
  </head>

  <body class="antialiased bg-gray-900 text-gray-300">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section id="contact-hero" class="text-center py-16 md:py-24">
        <h1
          class="text-4xl md:text-5xl font-bold text-white mb-4"
          data-i18n="contact.title"
        >
          Contato – Fastformat
        </h1>
        <p
          class="text-lg md:text-xl text-gray-400 max-w-3xl mx-auto"
          data-i18n="contact.subtitle"
        >
          Converta, edite e processe seus arquivos de forma simples, rápida e
          100% no navegador.
        </p>
      </section>

      <div class="max-w-2xl mx-auto text-center py-8">
        <p class="text-lg text-gray-400">
          <span data-i18n="contact.email"
            >Você pode falar conosco diretamente por e-mail:</span
          >
          <a
            href="mailto:contact@fastformat.co"
            class="text-indigo-400 underline hover:text-indigo-300"
            >contact@fastformat.co</a
          >
        </p>
      </div>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/main.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contato FastFormat - Fale Conosco | Suporte",
        "url": "https://fastformat.co/pdf/contato"
      }
    </script>
  </body>
</html>
